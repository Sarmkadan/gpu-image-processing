# Prometheus configuration for GPU Image Processing metrics

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'gpu-processing'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Load rules once and periodically evaluate them
rule_files:
  - 'alert.rules.yml'

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # GPU Image Processing metrics
  - job_name: 'gpu-processing'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['localhost:8080']
    scrape_interval: 10s
    scrape_timeout: 5s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # GPU Processing Application Server
  - job_name: 'gpu-processing-app'
    static_configs:
      - targets: ['localhost:80']
    scrape_interval: 30s
    scrape_timeout: 10s

  # Node metrics (if monitoring host)
  - job_name: 'node'
    static_configs:
      - targets: ['localhost:9100']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # GPU metrics (NVIDIA DCGM if available)
  - job_name: 'nvidia-dcgm'
    static_configs:
      - targets: ['localhost:9400']
    scrape_interval: 10s
    scrape_timeout: 5s
    honor_timestamps: true
