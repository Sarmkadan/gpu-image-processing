name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build and Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        dotnet-version: ['10.0.x']

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.dotnet-version }}

    - name: Display .NET Version
      run: dotnet --version

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Run tests
      run: dotnet test --configuration Release --no-build --verbosity normal

    - name: Run code analysis
      run: dotnet build /p:EnforceCodeStyleInBuild=true --configuration Release
      continue-on-error: true

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Check formatting
      run: dotnet format --verify-no-changes
      continue-on-error: true

    - name: Run code analysis
      run: dotnet build --configuration Release /p:EnforceCodeStyleInBuild=true
      continue-on-error: true

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Test with coverage
      run: |
        dotnet test --configuration Release --no-build \
          /p:CollectCoverage=true \
          /p:CoverageFormat=opencover \
          /p:ExcludeByAttribute=ExcludeFromCodeCoverage

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.opencover.xml
        fail_ci_if_error: false
        verbose: true
      continue-on-error: true

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
      if: secrets.DOCKER_USERNAME != ''

    - name: Build and push Docker image
      uses: docker/build-push-action@v7
      with:
        context: .
        push: ${{ secrets.DOCKER_USERNAME != '' }}
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/gpu-image-processing:latest
          ${{ secrets.DOCKER_USERNAME }}/gpu-image-processing:${{ github.sha }}
        cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/gpu-image-processing:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/gpu-image-processing:buildcache,mode=max
      if: secrets.DOCKER_USERNAME != ''

    - name: Build Docker image (local only)
      uses: docker/build-push-action@v7
      with:
        context: .
        push: false
        load: true
        tags: gpu-image-processing:latest
      if: secrets.DOCKER_USERNAME == ''

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build, code-quality, coverage]

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build Release
      run: dotnet build --configuration Release --no-restore

    - name: Publish Release
      run: dotnet publish --configuration Release -o ./publish

    - name: Create Release Asset
      run: |
        cd publish
        tar -czf ../gpu-image-processing-${{ github.ref_name }}.tar.gz *
        cd ..

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: gpu-image-processing-${{ github.ref_name }}.tar.gz
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Publish to NuGet
      run: |
        dotnet nuget push ./nupkg/*.nupkg \
          -k ${{ secrets.NUGET_API_KEY }} \
          -s https://api.nuget.org/v3/index.json
      if: secrets.NUGET_API_KEY != ''
      continue-on-error: true

  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    if: always()
    needs: [build, code-quality, coverage]

    steps:
    - name: Check build status
      run: |
        if [ "${{ needs.build.result }}" == "failure" ]; then
          echo "::error::Build failed"
          exit 1
        fi

    - name: Success message
      if: success()
      run: echo "✓ All checks passed!"
